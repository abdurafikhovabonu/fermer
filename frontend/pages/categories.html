<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fermerlik yo'nalishlari | Fermerlar Maktabi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        
        .navbar {
            background: #2d5a27;
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo-icon { margin-right: 10px; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: white; text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #ffd700; }
        .auth-buttons button {
            background: #ffd700;
            color: #2d5a27;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .page-title {
            color: #2d5a27;
            margin-bottom: 2rem;
            font-size: 2rem;
            border-left: 5px solid #ffd700;
            padding-left: 1rem;
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .category-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .category-card:hover {
            transform: translateY(-5px);
        }
        .category-header {
            background: linear-gradient(135deg, #2d5a27 0%, #1e3d1a 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        .category-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .category-name {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .category-body {
            padding: 1.5rem;
        }
        .category-description {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .learn-more {
            color: #2d5a27;
            font-weight: bold;
            text-decoration: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }
        .close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><span class="logo-icon">🌾</span><span>Fermerlar Maktabi</span></div>
            <ul class="nav-links">
                <li><a href="../index.html">Bosh sahifa</a></li>
                <li><a href="calculator.html">Hosildorlik kalkulyatori</a></li>
                <li><a href="fertilizers.html">O'g'itlar</a></li>
                <li><a href="land-rent.html">Yer ijarasi</a></li>
                <li><a href="categories.html" class="active">Yo'nalishlar</a></li>
                <li><a href="profile.html">Profil</a></li>
            </ul>
            <div class="auth-buttons" id="authSection"><button onclick="showLoginModal()">Kirish</button></div>
        </div>
    </nav>

    <div class="main-container">
        <h1 class="page-title">🌾 Fermerlik yo'nalishlari</h1>
        <div id="categoriesList" class="categories-grid"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; border-radius:20px; width:90%; max-width:400px; padding:2rem;">
            <span onclick="closeLoginModal()" style="float:right; font-size:1.5rem; cursor:pointer;">&times;</span>
            <h3>Kirish</h3>
            <input type="tel" id="phoneInput" placeholder="Telefon raqam (+998...)" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
            <button onclick="login()" style="width:100%; padding:10px; background:#2d5a27; color:white; border:none; border-radius:5px; cursor:pointer;">Kirish</button>
        </div>
    </div>

    <script>
      // categories.html boshida
const API_URL = 'https://fermer-production.up.railway.app/api';
        
        const categories = [
            { id: 1, name: "Dehqonchilik", icon: "🌾", description: "Don, sabzavot va mevalarni yetishtirish", guide: "Dehqonchilik bo'yicha to'liq qo'llanma: Ekinlarni tanlash, tuproq tayyorlash, ekish va parvarish qilish bo'yicha maslahatlar." },
            { id: 2, name: "Chorvachilik", icon: "🐄", description: "Qoramol, qo'y va echkichilik", guide: "Chorvachilik asoslari: Hayvonlarni boqish, parvarish qilish, sog'ish va ko'paytirish." },
            { id: 3, name: "Bog'dorchilik", icon: "🍎", description: "Mevali daraxtlar va uzumchilik", guide: "Bog' tashkil etish: Daraxt ekish, budama, zararkunandalarga qarshi kurash." },
            { id: 4, name: "Issiqxona xo'jaligi", icon: "🏠", description: "Yopiq joyda sabzavot yetishtirish", guide: "Issiqxona qurish, harorat va namlikni boshqarish, yil bo'yi hosil olish." },
            { id: 5, name: "Asalarichilik", icon: "🐝", description: "Asal va asalarichilik mahsulotlari", guide: "Asalarichilik asoslari: Asalari oilalarini saqlash, asal yig'ish va qayta ishlash." },
            { id: 6, name: "Baliqchilik", icon: "🐟", description: "Sun'iy suv havzalarida baliq yetishtirish", guide: "Baliqchilik: Hovuz qurish, baliq turlari, ozuqa va kasalliklarga qarshi kurash." }
        ];
        
        function loadCategories() {
            const container = document.getElementById('categoriesList');
            container.innerHTML = categories.map(cat => `
                <div class="category-card" onclick="showDetail(${cat.id})">
                    <div class="category-header">
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-name">${cat.name}</div>
                    </div>
                    <div class="category-body">
                        <div class="category-description">${cat.description}</div>
                        <span class="learn-more">Batafsil →</span>
                    </div>
                </div>
            `).join('');
        }
        
        function showDetail(id) {
            const cat = categories.find(c => c.id === id);
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2 style="color:#2d5a27;">${cat.icon} ${cat.name}</h2>
                <p style="margin: 1rem 0; line-height: 1.6;">${cat.guide}</p>
                <h3>📚 Biznes reja</h3>
                <p>Boshlang'ich sarmoya: 10-50 million so'm<br>
                Kutilayotgan daromad: yiliga 30-100 million so'm<br>
                Qoplanish muddati: 1-3 yil</p>
                <h3>🏆 Subidiyalar</h3>
                <p>Davlat tomonidan fermerlarga 50% gacha subsidiyalar mavjud. Batafsil ma'lumot uchun mahalliy hokimlikka murojaat qiling.</p>
            `;
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }
        
        function showLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        
        async function login() {
            const phone = document.getElementById('phoneInput').value;
            if (!phone) { alert('Telefon raqam kiriting'); return; }
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    closeLoginModal();
                    updateAuthUI();
                }
            } catch(error) {
                localStorage.setItem('currentUser', JSON.stringify({ id: Date.now(), phone }));
                closeLoginModal();
                updateAuthUI();
            }
        }
        
        function logout() { localStorage.removeItem('currentUser'); updateAuthUI(); }
        
        function updateAuthUI() {
            const authSection = document.getElementById('authSection');
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (user.phone) {
                authSection.innerHTML = `<div style="display:flex; align-items:center; gap:10px;"><span style="color:white;">👋 ${user.phone.slice(-9)}</span><button onclick="logout()" style="background:#ffd700; color:#2d5a27; border:none; padding:5px 12px; border-radius:5px; cursor:pointer;">Chiqish</button></div>`;
            } else {
                authSection.innerHTML = '<button onclick="showLoginModal()" style="background:#ffd700; color:#2d5a27; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Kirish</button>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            updateAuthUI();
        });
    </script>
</body>
</html>
