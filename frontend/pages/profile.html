<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening profilim | Fermerlar Maktabi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        
        .navbar {
            background: #2d5a27;
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo-icon { margin-right: 10px; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: white; text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #ffd700; }
        
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .profile-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .profile-header {
            background: linear-gradient(135deg, #2d5a27 0%, #1e3d1a 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            margin: 0 auto 1rem;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .profile-name {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .profile-role {
            background: #ffd700;
            color: #2d5a27;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .profile-body {
            padding: 2rem;
        }
        .info-row {
            display: flex;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }
        .info-label {
            width: 150px;
            font-weight: bold;
            color: #666;
        }
        .info-value {
            flex: 1;
            color: #333;
        }
        .edit-btn, .save-btn {
            background: #2d5a27;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }
        .edit-btn:hover, .save-btn:hover { background: #1e3d1a; }
        
        .edit-input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
            max-width: 300px;
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .tab.active {
            color: #2d5a27;
            border-bottom: 2px solid #2d5a27;
            font-weight: bold;
        }
        
        .orders-list, .requests-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .order-item, .request-item {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-pending { background: #ff9800; color: white; }
        .status-confirmed { background: #4caf50; color: white; }
        .status-delivered { background: #2196f3; color: white; }
        .status-cancelled { background: #f44336; color: white; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .info-row { flex-direction: column; }
            .info-label { width: 100%; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><span class="logo-icon">🌾</span><span>Fermerlar Maktabi</span></div>
            <ul class="nav-links">
                <li><a href="../index.html">Bosh sahifa</a></li>
                <li><a href="calculator.html">Kalkulyator</a></li>
                <li><a href="fertilizers.html">O'g'itlar</a></li>
                <li><a href="land-rent.html">Yer ijarasi</a></li>
                <li><a href="categories.html">Yo'nalishlar</a></li>
                <li><a href="profile.html" class="active">Profil</a></li>
            </ul>
            <div class="auth-buttons" id="authSection"></div>
        </div>
    </nav>

    <div class="main-container">
        <div id="profileContent">
            <!-- Profil ma'lumotlari JS orqali yuklanadi -->
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentUser = null;
        let isEditing = false;
        
        async function checkAuth() {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = '../index.html';
                return false;
            }
            currentUser = JSON.parse(savedUser);
            return true;
        }
        
        async function loadProfile() {
            if (!await checkAuth()) return;
            
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">${currentUser.firstName ? currentUser.firstName[0] : '👤'}${currentUser.lastName ? currentUser.lastName[0] : ''}</div>
                        <div class="profile-name" id="displayName">${currentUser.firstName || ''} ${currentUser.lastName || ''}</div>
                        <div class="profile-role">${currentUser.role === 'admin' ? '👑 Administrator' : '🌾 Fermer'}</div>
                    </div>
                    <div class="profile-body">
                        <div class="info-row">
                            <div class="info-label">Ism</div>
                            <div class="info-value" id="displayFirstName">${currentUser.firstName || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Familiya</div>
                            <div class="info-value" id="displayLastName">${currentUser.lastName || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Telefon raqam</div>
                            <div class="info-value" id="displayPhone">${currentUser.phone || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Ro'yxatdan o'tgan</div>
                            <div class="info-value">${new Date(currentUser.createdAt).toLocaleDateString() || '-'}</div>
                        </div>
                        <button class="edit-btn" onclick="toggleEdit()" id="editBtn">✏️ Tahrirlash</button>
                    </div>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="showTab('orders')">📦 Mening buyurtmalarim</button>
                    <button class="tab" onclick="showTab('requests')">📝 Yer zaproslari</button>
                </div>
                
                <div id="ordersTab">
                    <div class="orders-list" id="ordersList">⏳ Yuklanmoqda...</div>
                </div>
                <div id="requestsTab" style="display:none;">
                    <div class="requests-list" id="requestsList">⏳ Yuklanmoqda...</div>
                </div>
            `;
            
            loadUserOrders();
            loadUserRequests();
        }
        
        function toggleEdit() {
            isEditing = !isEditing;
            if (isEditing) {
                document.getElementById('displayFirstName').innerHTML = `<input type="text" id="editFirstName" value="${currentUser.firstName || ''}" class="edit-input">`;
                document.getElementById('displayLastName').innerHTML = `<input type="text" id="editLastName" value="${currentUser.lastName || ''}" class="edit-input">`;
                document.getElementById('displayPhone').innerHTML = `<input type="tel" id="editPhone" value="${currentUser.phone || ''}" class="edit-input">`;
                document.getElementById('editBtn').innerHTML = '💾 Saqlash';
                document.getElementById('editBtn').onclick = saveProfile;
            } else {
                loadProfile();
            }
        }
        
        async function saveProfile() {
            const updatedUser = {
                ...currentUser,
                firstName: document.getElementById('editFirstName').value,
                lastName: document.getElementById('editLastName').value,
                phone: document.getElementById('editPhone').value
            };
            
            try {
                const response = await fetch(`${API_URL}/users/${currentUser.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedUser)
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    currentUser = result.user;
                    showToast('✅ Profil muvaffaqiyatli yangilandi!');
                    isEditing = false;
                    loadProfile();
                }
            } catch (error) {
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                currentUser = updatedUser;
                showToast('✅ Profil yangilandi (offline)');
                isEditing = false;
                loadProfile();
            }
        }
        
        async function loadUserOrders() {
            try {
                const response = await fetch(`${API_URL}/orders`);
                const allOrders = await response.json();
                const userOrders = allOrders.filter(o => o.userId === currentUser.id || o.customerPhone === currentUser.phone);
                
                if (userOrders.length === 0) {
                    document.getElementById('ordersList').innerHTML = '<p style="text-align:center; padding:2rem;">📭 Sizning buyurtmalaringiz yo\'q</p>';
                    return;
                }
                
                document.getElementById('ordersList').innerHTML = userOrders.map(order => `
                    <div class="order-item">
                        <div>
                            <strong>${order.orderNumber || 'ORD-' + order.id}</strong><br>
                            <small>${new Date(order.date).toLocaleString()}</small><br>
                            <small>Jami: ${(order.total || 0).toLocaleString()} so'm</small>
                        </div>
                        <div>
                            <span class="status status-${order.status}">${getStatusText(order.status)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                const localOrders = JSON.parse(localStorage.getItem('orders') || '[]');
                const userOrders = localOrders.filter(o => o.userId === currentUser.id || o.customerPhone === currentUser.phone);
                document.getElementById('ordersList').innerHTML = userOrders.length ? 
                    userOrders.map(order => `<div class="order-item"><div><strong>${order.orderNumber || 'ORD-' + order.id}</strong><br><small>${new Date(order.date).toLocaleString()}</small><br><small>Jami: ${(order.total || 0).toLocaleString()} so'm</small></div><div><span class="status status-${order.status}">${getStatusText(order.status)}</span></div></div>`).join('') :
                    '<p style="text-align:center; padding:2rem;">📭 Sizning buyurtmalaringiz yo\'q</p>';
            }
        }
        
        async function loadUserRequests() {
            try {
                const response = await fetch(`${API_URL}/land-requests`);
                const allRequests = await response.json();
                const userRequests = allRequests.filter(r => r.farmerPhone === currentUser.phone || r.farmerId === currentUser.id);
                
                if (userRequests.length === 0) {
                    document.getElementById('requestsList').innerHTML = '<p style="text-align:center; padding:2rem;">📭 Sizning yer zaproslaringiz yo\'q</p>';
                    return;
                }
                
                document.getElementById('requestsList').innerHTML = userRequests.map(req => `
                    <div class="order-item">
                        <div>
                            <strong>📍 ${req.landLocation}</strong><br>
                            <small>${req.landAddress}</small><br>
                            <small>Maydon: ${req.landArea} ga | ${new Date(req.date).toLocaleDateString()}</small>
                        </div>
                        <div>
                            <span class="status status-${req.status === 'pending' ? 'pending' : 'confirmed'}">${req.status === 'pending' ? '⏳ Kutilmoqda' : '✅ Ko\'rib chiqilgan'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('requestsList').innerHTML = '<p style="text-align:center; padding:2rem;">📭 Sizning yer zaproslaringiz yo\'q</p>';
            }
        }
        
        function getStatusText(status) {
            const statuses = {
                pending: '⏳ Kutilmoqda',
                confirmed: '✅ Tasdiqlangan',
                shipped: '🚚 Yetkazilmoqda',
                delivered: '📦 Yetkazilgan',
                cancelled: '❌ Bekor qilingan'
            };
            return statuses[status] || status;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'orders') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('ordersTab').style.display = 'block';
                document.getElementById('requestsTab').style.display = 'none';
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('ordersTab').style.display = 'none';
                document.getElementById('requestsTab').style.display = 'block';
            }
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `position:fixed; bottom:20px; right:20px; background:#2d5a27; color:white; padding:12px 24px; border-radius:8px; z-index:9999;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateAuthUI() {
            const authSection = document.getElementById('authSection');
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (user.firstName) {
                authSection.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="color:white;">👋 ${user.firstName}</span>
                        <button onclick="logout()" style="background:#ffd700; color:#2d5a27; border:none; padding:5px 12px; border-radius:5px; cursor:pointer;">Chiqish</button>
                    </div>
                `;
            } else {
                authSection.innerHTML = '<a href="../index.html" style="color:white;">⬅ Bosh sahifa</a>';
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            updateAuthUI();
        });
    </script>
</body>
</html>
